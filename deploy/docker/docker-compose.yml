version: "3.9"

services:
  api:
    build:
      context: ../../
      dockerfile: deploy/docker/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      POSTGRES_DSN: postgresql://sil:silpass@postgres:5432/silcore
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: deploy/docker/worker/Dockerfile
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sil
      POSTGRES_PASSWORD: silpass
      POSTGRES_DB: silcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sil"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ../../
      dockerfile: deploy/docker/dashboard/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  redis_data:
  postgres_data:
