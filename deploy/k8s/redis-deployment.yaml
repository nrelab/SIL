apiVersion: apps/v1
kind: Deployment
metadata:
  name: sil-redis
  labels:
    app: sil
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sil
      tier: cache
  template:
    metadata:
      labels:
        app: sil
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sil-redis
  labels:
    app: sil
    tier: cache
spec:
  selector:
    app: sil
    tier: cache
  ports:
    - port: 6379
      targetPort: 6379
