global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "sil-api"
    static_configs:
      - targets: ["sil-api:8000"]

  - job_name: "sil-worker"
    static_configs:
      - targets: ["sil-worker:9090"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
